<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Montserrat', sans-serif; }
  .bg-ceiling-gradient {
    background: linear-gradient(180deg, #051827 0%, #214457 40%, #386994 100%);
  }
</style>
<body class="bg-ceiling-gradient min-h-screen text-[#bdd9cd] flex flex-col items-center justify-center p-6">

  <header class="mb-12 text-center">
    <h1 class="text-6xl font-800 tracking-tighter text-[#bdd9cd] drop-shadow-lg">
      SAVEN
    </h1>
    <p class="text-[#8eaebb] uppercase tracking-[0.3em] text-sm mt-2">Hear • Hug • Help</p>
  </header>

  <main class="max-w-2xl text-center space-y-8">
    <h2 class="text-4xl font-700 leading-tight text-white">
      Your voice deserves a <span class="text-[#bdd9cd]">safe haven.</span>
    </h2>
    
    <p class="text-lg font-300 text-[#8eaebb] leading-relaxed">
      Saven is a next-generation AI companion designed to hold space for your thoughts. 
      Speak freely, be heard without judgment, and receive a visual and vocal 'hug' 
      tailored to your moment of need.
    </p>

    <div class="pt-8">
      <a href="/app" class="inline-block bg-[#bdd9cd] text-[#051827] px-10 py-4 rounded-full font-700 text-lg transition-transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(189,217,205,0.3)]">
        Enter Saven
      </a>
    </div>
  </main>

  <div class="mt-20 w-64 h-16 flex items-center justify-between space-x-1">
    <div class="w-1 bg-[#8eaebb] h-4 animate-bounce"></div>
    <div class="w-1 bg-[#8eaebb] h-10 animate-pulse"></div>
    <div class="w-1 bg-[#bdd9cd] h-16 animate-bounce"></div>
    <div class="w-1 bg-[#8eaebb] h-8 animate-pulse"></div>
    <div class="w-1 bg-[#8eaebb] h-4 animate-bounce"></div>
  </div>

</body>
